<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="1; url=https://labajaditabarberstudio.com">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <title>WiFi conectado | La Bajadita Barber Studio</title>
    <link rel="stylesheet" href="css/style.css">
    <script>
        function startClock() {
            $(if popup == 'true')
            open('$(link-status)', 'hotspot_status', 'toolbar=0,location=0,directories=0,status=0,menubars=0,resizable=1,width=290,height=200');
        $(endif)
            location.href = 'https://labajaditabarberstudio.com';
        }
    </script>
</head>

<body onLoad="startClock()">
    <div class="ie-fixMinHeight">
        <div class="main">
            <div class="wrap">
                <h1>WiFi conectado</h1>
                <p class="info">Te estamos llevando a La Bajadita Barber Studio.</p>
                <p class="info">Si no pasa nada, abre <a href="https://labajaditabarberstudio.com">labajaditabarberstudio.com</a></p>
            </div>
        </div>
    </div>
</body>

</html>
